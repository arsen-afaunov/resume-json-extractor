services:
  ollama:
    image: ollama/ollama:0.18.3
    container_name: resume-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./.ollama:/root/.ollama
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:3b}

  api:
    image: python:3.11-slim
    container_name: resume-api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    working_dir: /app
    command: >
      sh -c "pip install -r requirements.txt &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama
